<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stone Paper Scissors</title>
  <style>
    * { box-sizing: border-box; font-family: Arial, Helvetica, sans-serif; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
    }
    .card {
      background: rgba(255,255,255,0.12);
      backdrop-filter: blur(14px);
      border: 1px solid rgba(255,255,255,0.25);
      border-radius: 24px;
      padding: 28px 28px 32px;
      width: min(92vw, 520px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.35);
      text-align: center;
    }
    h1 { margin: 6px 0 18px; letter-spacing: 1px; }
    .score {
      display: flex;
      justify-content: space-between;
      margin-bottom: 18px;
      font-size: 1.1rem;
      opacity: 0.95;
    }
    .arena {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin: 14px 0 18px;
    }
    .box {
      background: rgba(0,0,0,0.25);
      border-radius: 16px;
      padding: 16px;
      min-height: 120px;
      display: grid;
      place-items: center;
      border: 1px solid rgba(255,255,255,0.18);
    }
    .label { font-size: 0.9rem; opacity: 0.8; margin-bottom: 6px; }
    .emoji { font-size: 3rem; }
    .choices {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-top: 6px;
    }
    button.choice {
      border: none;
      border-radius: 18px;
      padding: 14px 10px;
      font-size: 1rem;
      cursor: pointer;
      background: linear-gradient(135deg, #ff9a9e, #fad0c4);
      color: #2a2a2a;
      font-weight: 700;
      box-shadow: 0 8px 18px rgba(0,0,0,0.25);
      transition: transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }
    button.choice:nth-child(2){ background: linear-gradient(135deg, #a1c4fd, #c2e9fb); }
    button.choice:nth-child(3){ background: linear-gradient(135deg, #fbc2eb, #a6c1ee); }
    button.choice:hover { transform: translateY(-2px) scale(1.02); filter: brightness(1.05); }
    button.choice:active { transform: translateY(0) scale(0.98); box-shadow: 0 4px 10px rgba(0,0,0,0.25); }
    .result {
      margin-top: 16px;
      font-size: 1.25rem;
      font-weight: 800;
      letter-spacing: .5px;
      min-height: 1.6em;
    }
    .reset {
      margin-top: 14px;
      border: none;
      background: rgba(0,0,0,0.35);
      color: #fff;
      padding: 10px 16px;
      border-radius: 12px;
      cursor: pointer;
      border: 1px solid rgba(255,255,255,0.2);
    }
    .footer { margin-top: 10px; font-size: 0.85rem; opacity: 0.75; }
  </style>
</head>
<body>
  <div class="card">
    <h1>🪨 📄 ✂️ Stone • Paper • Scissors</h1>

    <div class="score">
      <div>👤 You: <b id="userScore">0</b></div>
      <div>🤖 Computer: <b id="compScore">0</b></div>
    </div>

    <div class="arena">
      <div class="box">
        <div>
          <div class="label">Your Choice</div>
          <div id="userPick" class="emoji">❔</div>
        </div>
      </div>
      <div class="box">
        <div>
          <div class="label">Computer</div>
          <div id="compPick" class="emoji">❔</div>
        </div>
      </div>
    </div>

    <div class="choices">
      <button class="choice" data-pick="stone">🪨 Stone</button>
      <button class="choice" data-pick="paper">📄 Paper</button>
      <button class="choice" data-pick="scissors">✂️ Scissors</button>
    </div>

    <div id="result" class="result"></div>
    <button class="reset" id="resetBtn">Reset Score</button>
    <div class="footer">First to have fun wins 😄</div>
  </div>

  <script>
    const emojis = { stone: '🪨', paper: '📄', scissors: '✂️' };
    const choices = ['stone', 'paper', 'scissors'];

    let userScore = 0, compScore = 0;

    const userScoreEl = document.getElementById('userScore');
    const compScoreEl = document.getElementById('compScore');
    const userPickEl = document.getElementById('userPick');
    const compPickEl = document.getElementById('compPick');
    const resultEl = document.getElementById('result');

    function computerPick() {
      const i = Math.floor(Math.random() * 3);
      return choices[i];
    }

    function decide(u, c) {
      if (u === c) return 'draw';
      if (
        (u === 'stone' && c === 'scissors') ||
        (u === 'paper' && c === 'stone') ||
        (u === 'scissors' && c === 'paper')
      ) return 'win';
      return 'lose';
    }

    function play(u) {
      const c = computerPick();

      userPickEl.textContent = emojis[u];
      compPickEl.textContent = emojis[c];

      const outcome = decide(u, c);

      if (outcome === 'win') {
        userScore++;
        resultEl.textContent = '🎉 You Win!';
      } else if (outcome === 'lose') {
        compScore++;
        resultEl.textContent = '😅 Computer Wins!';
      } else {
        resultEl.textContent = '🤝 It\'s a Draw!';
      }

      userScoreEl.textContent = userScore;
      compScoreEl.textContent = compScore;
    }

    document.querySelectorAll('.choice').forEach(btn => {
      btn.addEventListener('click', () => play(btn.dataset.pick));
    });

    document.getElementById('resetBtn').addEventListener('click', () => {
      userScore = compScore = 0;
      userScoreEl.textContent = compScoreEl.textContent = '0';
      userPickEl.textContent = compPickEl.textContent = '❔';
      resultEl.textContent = '';
    });
  </script>
</body>
</html>
